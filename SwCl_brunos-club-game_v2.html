<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno's Club</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --night:#12101e;--deep:#1c1830;--purple:#2e2650;--violet:#5c3d8f;
  --pink:#e84393;--gold:#f5c842;--teal:#2ec4b6;--green:#4cbb7a;
  --red:#e84040;--orange:#f58a30;--blue:#4a90d9;--text:#f0ebff;--dim:#8878aa;
}
body{
  background:var(--night);color:var(--text);font-family:'Nunito',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(92,61,143,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(46,196,182,0.15) 0%,transparent 50%);
}
.shell{
  width:100%;max-width:820px;display:flex;flex-direction:column;
  align-items:center;padding:1.2rem 1rem 3rem;position:relative;z-index:1;gap:.9rem;
}

/* Top bar */
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.game-title{font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,4vw,1.9rem);color:var(--gold);text-shadow:0 0 18px rgba(245,200,66,.5);}
.level-nav{display:flex;align-items:center;gap:.5rem;}
.nav-btn{
  font-family:'Fredoka One',cursive;font-size:.85rem;
  padding:.3rem .8rem;border-radius:20px;border:1.5px solid var(--violet);
  background:var(--deep);color:var(--dim);cursor:pointer;transition:all .2s;
}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.level-pills{display:flex;gap:.3rem;}
.lvl-pip{
  width:26px;height:7px;border-radius:4px;cursor:pointer;
  background:var(--purple);border:1px solid var(--violet);transition:all .35s;
}
.lvl-pip.done  {background:var(--green);border-color:var(--green);box-shadow:0 0 7px rgba(76,187,122,.6);}
.lvl-pip.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 7px rgba(245,200,66,.6);}

/* Card */
.level-card{
  width:100%;
  background:linear-gradient(145deg,var(--deep) 0%,var(--purple) 100%);
  border-radius:22px;border:1.5px solid rgba(255,255,255,.08);
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  overflow:hidden;
}
.level-header{
  padding:.85rem 1.4rem .7rem;display:flex;align-items:center;gap:.9rem;
  border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap;
}
.level-badge{font-family:'Fredoka One',cursive;font-size:.72rem;letter-spacing:.1em;padding:.22rem .7rem;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.level-title{font-family:'Fredoka One',cursive;font-size:clamp(.95rem,2.8vw,1.3rem);}
.level-sub  {font-size:.7rem;font-weight:600;color:var(--dim);line-height:1.4;margin-left:auto;max-width:200px;text-align:right;}

/* Game viewport */
.game-view{position:relative;width:100%;height:370px;overflow:hidden;}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;}
.hud{position:absolute;top:9px;right:11px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;pointer-events:none;}
.hud-score{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold);text-shadow:0 0 10px rgba(245,200,66,.7);}
.hud-lbl{font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}
.energy-wrap{position:absolute;top:9px;left:11px;display:flex;flex-direction:column;gap:3px;pointer-events:none;}
.energy-track{width:90px;height:9px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;}
.energy-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--orange),var(--gold));transition:width .15s;}
.qbar-wrap{position:absolute;bottom:9px;left:11px;right:11px;display:flex;align-items:center;gap:7px;}
.qbar-lbl{font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.qbar-track{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}
.qbar-fill{height:100%;border-radius:4px;transition:width .3s,background .5s;}

/* Bottom panel */
.bottom-panel{padding:.9rem 1.4rem 1.1rem;display:flex;flex-direction:column;gap:.65rem;border-top:1px solid rgba(255,255,255,.06);}
.lesson-box{background:rgba(0,0,0,.25);border-radius:10px;padding:.65rem .95rem;font-size:.8rem;font-weight:600;line-height:1.55;color:rgba(240,235,255,.82);border-left:3px solid;}
.action-row{display:flex;gap:.55rem;flex-wrap:wrap;}
.btn{font-family:'Fredoka One',cursive;font-size:.92rem;padding:.55rem 1.3rem;border-radius:28px;border:none;cursor:pointer;transition:all .18s cubic-bezier(.34,1.56,.64,1);box-shadow:0 3px 10px rgba(0,0,0,.3);}
.btn:active{transform:scale(.95)!important;}
.btn-teal  {background:var(--teal);color:white;}
.btn-gold  {background:var(--gold);color:#1a1208;}
.btn-orange{background:var(--orange);color:white;}
.btn-pink  {background:var(--pink);color:white;}
.btn-red   {background:var(--red);color:white;}
.btn-green {background:var(--green);color:white;}
.btn:hover {transform:scale(1.05);filter:brightness(1.08);}

/* Toast */
.toast{
  position:fixed;top:50%;left:50%;z-index:999;
  transform:translate(-50%,-50%) scale(.7);
  background:linear-gradient(135deg,var(--deep),var(--purple));
  border:2px solid var(--gold);border-radius:22px;
  padding:1.6rem 2rem;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.75);
  opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  max-width:360px;width:90%;
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all;}
.t-icon {font-size:2.4rem;margin-bottom:.4rem;}
.t-title{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--gold);margin-bottom:.35rem;}
.t-body {font-size:.82rem;line-height:1.62;color:rgba(240,235,255,.82);margin-bottom:1rem;}
.t-cert {font-size:.7rem;font-style:italic;color:var(--teal);margin-bottom:.8rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.6rem;}

/* Particles */
#particles{position:fixed;inset:0;pointer-events:none;z-index:500;}
</style>
</head>
<body>
<div id="particles"></div>
<div class="shell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="game-title">Bruno's Club</div>
    <div class="level-nav">
      <button class="nav-btn" id="btn-prev" onclick="goLevel(currentLevel-1)" disabled>&#8592; Prev</button>
      <div class="level-pills" id="pips"></div>
      <button class="nav-btn" id="btn-next" onclick="goLevel(currentLevel+1)">Next &#8594;</button>
    </div>
  </div>

  <!-- Level card -->
  <div class="level-card">
    <div class="level-header">
      <span class="level-badge" id="lvl-badge">Level 1</span>
      <span class="level-title" id="lvl-title">Meet the Queue</span>
      <span class="level-sub"  id="lvl-sub">Bruno is here!</span>
    </div>
    <div class="game-view">
      <canvas id="gc"></canvas>
      <div class="hud">
        <div class="hud-lbl">Ions inside</div>
        <div class="hud-score" id="hud-score">0</div>
      </div>
      <div class="energy-wrap" id="energy-wrap" style="display:none">
        <div class="hud-lbl">Bruno's Energy</div>
        <div class="energy-track"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
      </div>
      <div class="qbar-wrap">
        <span class="qbar-lbl" id="qbar-lbl">Outside queue</span>
        <div class="qbar-track"><div class="qbar-fill" id="qbar-fill" style="width:15%;background:var(--green)"></div></div>
      </div>
    </div>
    <div class="bottom-panel">
      <div class="lesson-box" id="lesson-box" style="border-color:var(--teal)">...</div>
      <div class="action-row" id="action-row"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="t-icon"  id="t-icon"></div>
  <div class="t-title" id="t-title"></div>
  <div class="t-body"  id="t-body"></div>
  <div class="t-cert"  id="t-cert" style="display:none"></div>
  <button class="btn btn-gold" id="t-btn">Next Level</button>
</div>

<script>
// =========================================================
// GLOBALS
// =========================================================
var currentLevel = 0;
var score        = 0;
var queuePct     = 0.12;
var boostEnergy  = 100;
var animId       = null;
var frameN       = 0;
var levelDone    = false;
var insideIons   = [];   // ions that have entered the club - shown inside

var canvas = document.getElementById('gc');
var ctx    = canvas.getContext('2d');
function CW(){ return canvas.width; }
function CH(){ return canvas.height; }

function resizeCanvas(){
  var r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}
window.addEventListener('resize', function(){ resizeCanvas(); goLevel(currentLevel); });

// =========================================================
// LEVEL DATA
// =========================================================
var LEVELS = [
  {
    badge:'Level 1', color:'#2ec4b6',
    title:'Meet the Queue',
    sub:'Bruno is at the door!',
    lesson:'CFTR - nicknamed Bruno - is the bouncer at the Sweat Cell Club. His job is to let chloride ions (the glowing orbs queuing outside) pass through the cell membrane into the cell. Tap each ion to let it in!',
    mechanic:'tap'
  },
  {
    badge:'Level 2', color:'#e84040',
    title:"Bruno Didn't Show Up",
    sub:'The queue is growing...',
    lesson:"In cystic fibrosis, the CFTR protein is missing, misfolded, or not working. Just like the CFTR protein that is dysfunctional in CF, Bruno is asleep across the doorway to the sweat cell club - no chloride ions can get in. Watch the queue pile up outside.",
    mechanic:'watch'
  },
  {
    badge:'Level 3', color:'#f5c842',
    title:'Wake-Up Call',
    sub:'Drag the coffee to Bruno!',
    lesson:'CFTR corrector treatments help the misfolded CFTR protein fold correctly and reach the cell membrane - like a wake-up call that gets Bruno off the floor and back to his post. Drag the coffee cup to wake him!',
    mechanic:'coffee'
  },
  {
    badge:'Level 4', color:'#f58a30',
    title:'Energy Drink',
    sub:'Give Bruno his energy drink!',
    lesson:"CFTR potentiator treatments help CFTR stay open once it's at the membrane - like an energy drink. Bruno made it to the door but keeps slowing down. Give him the energy drink once to get him going!",
    mechanic:'energy'
  },
  {
    badge:'Level 5', color:'#e84393',
    title:'Full Treatment',
    sub:'Corrector + Potentiator!',
    lesson:'When corrector and potentiator work together, Bruno is at the door AND full of energy. Tap ions AND keep Bruno boosted. Clear the street queue entirely - the Sweat Cell Club is waiting!',
    mechanic:'full'
  }
];

// =========================================================
// DRAW HELPERS
// =========================================================
function rr(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill)  { ctx.fillStyle=fill;  ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw||1.5; ctx.stroke(); }
}

function drawIon(x,y,radius,col,alpha){
  col   = col   || '#4a90d9';
  alpha = (alpha===undefined) ? 1 : alpha;
  ctx.globalAlpha = alpha;
  var g = ctx.createRadialGradient(x,y,0,x,y,radius*2.4);
  g.addColorStop(0, col+'bb'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,radius*2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='white';
  ctx.font='bold '+Math.round(radius*.72)+'px Nunito';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Cl⁻',x,y);
  ctx.textBaseline='alphabetic';
  ctx.globalAlpha=1;
}

// Split-scene geometry helper
function sceneGeom(){
  var cw=CW(), ch=CH();
  var split = Math.round(cw*0.5);   // centre divider = cell membrane
  return {
    cw:cw, ch:ch, split:split,
    // Outside (left half) - street
    outX:0, outW:split,
    // Inside (right half) - club interior
    inX:split, inW:cw-split,
    doorY: ch-60,       // y of door opening
    doorH: 50,          // door height
    brunoX: split,      // Bruno stands at the split
    brunoY: ch-96
  };
}

function drawScene(brunoState){
  var g = sceneGeom();
  var cw=g.cw, ch=g.ch;

  // ---- Outside: dark street (left) ----
  var streetGrad = ctx.createLinearGradient(0,0,g.split,0);
  streetGrad.addColorStop(0,'#0d0b1a');
  streetGrad.addColorStop(1,'#181428');
  ctx.fillStyle=streetGrad;
  ctx.fillRect(0,0,g.split,ch);

  // Pavement
  ctx.fillStyle='#1a1630';
  ctx.fillRect(0,ch-52,g.split,52);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(var x=0;x<g.split;x+=40) ctx.fillRect(x,ch-52,20,2);

  // Street label
  ctx.fillStyle='rgba(136,120,170,0.55)';
  ctx.font='bold 10px Nunito'; ctx.textAlign='left';
  ctx.fillText('Outside - Sweat Duct',10,18);

  // ---- Inside: club interior (right) ----
  var clubGrad = ctx.createLinearGradient(g.split,0,cw,0);
  clubGrad.addColorStop(0,'#120820');
  clubGrad.addColorStop(1,'#1e1040');
  ctx.fillStyle=clubGrad;
  ctx.fillRect(g.split,0,g.inW,ch);

  // Dance-floor shimmer
  for(var xi=g.split+10;xi<cw-10;xi+=22){
    for(var yi=18;yi<ch-60;yi+=22){
      var pulse=0.04+0.04*Math.sin(frameN*0.06+xi*0.07+yi*0.04);
      ctx.fillStyle='rgba(232,67,147,'+pulse+')';
      ctx.fillRect(xi,yi,10,10);
    }
  }

  // Club label + sign
  ctx.save();
  ctx.shadowColor='#e84393'; ctx.shadowBlur=14;
  ctx.fillStyle='#e84393';
  ctx.font='bold 11px Nunito'; ctx.textAlign='center';
  ctx.fillText('SWEAT CELL CLUB',g.split+g.inW/2,16);
  ctx.restore();
  ctx.fillStyle='rgba(136,120,170,0.4)';
  ctx.font='bold 9px Nunito'; ctx.textAlign='center';
  ctx.fillText('(inside the sweat gland cell)',g.split+g.inW/2,28);

  // Inside glow intensifies as ions collect
  var ionCount = insideIons.length;
  if(ionCount>0){
    var glow = ctx.createRadialGradient(g.split+g.inW/2,ch/2,10,g.split+g.inW/2,ch/2,g.inW*0.7);
    glow.addColorStop(0,'rgba(74,144,217,'+Math.min(0.22,ionCount*0.015)+')');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;
    ctx.fillRect(g.split,0,g.inW,ch);
  }

  // ---- Cell membrane (centre divider) ----
  ctx.fillStyle='rgba(92,61,143,0.7)';
  ctx.fillRect(g.split-4,0,8,ch);
  // Membrane texture dots
  for(var my=12;my<ch-60;my+=18){
    var mc = (my===Math.round(g.doorY-g.doorH/2)) ? 'rgba(232,67,147,0.9)' : 'rgba(255,255,255,0.18)';
    ctx.fillStyle=mc;
    ctx.beginPath(); ctx.arc(g.split,my,3,0,Math.PI*2); ctx.fill();
  }

  // Door gap in membrane
  ctx.fillStyle=clubGrad;
  ctx.fillRect(g.split-5, g.doorY-g.doorH, 10, g.doorH);

  // Door arch hint
  ctx.strokeStyle='rgba(232,67,147,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(g.split-12,g.doorY);
  ctx.lineTo(g.split-12,g.doorY-g.doorH);
  ctx.quadraticCurveTo(g.split,g.doorY-g.doorH-10,g.split+12,g.doorY-g.doorH);
  ctx.lineTo(g.split+12,g.doorY);
  ctx.stroke();

  // Velvet ropes
  ctx.strokeStyle='rgba(245,200,66,0.5)'; ctx.lineWidth=1.5;
  // left post
  ctx.beginPath(); ctx.moveTo(g.split-55,g.doorY-38); ctx.lineTo(g.split-55,g.doorY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(g.split-55,g.doorY-20); ctx.lineTo(g.split-14,g.doorY-20); ctx.stroke();
  // right post (inside, decorative)
  ctx.beginPath(); ctx.moveTo(g.split+55,g.doorY-38); ctx.lineTo(g.split+55,g.doorY); ctx.stroke();

  // ---- Collected ions inside ----
  for(var ii=0;ii<insideIons.length;ii++){
    var ion=insideIons[ii];
    ion.x += (ion.tx-ion.x)*0.08;
    ion.y += (ion.ty-ion.y)*0.08;
    ion.alpha = Math.min(1,ion.alpha+0.04);
    drawIon(ion.x,ion.y,ion.r,ion.col,ion.alpha);
  }

  // ---- Bruno ----
  drawBruno(g.brunoX, g.brunoY, brunoState);

  return g;
}

function drawBruno(x, y, state){
  var bob = (state==='gone'||state==='asleep') ? 0 : Math.sin(frameN*0.09)*3;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  if(state==='asleep'){
    ctx.beginPath(); ctx.ellipse(x,y+28,38,8,0,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(x,y+52,20,6,0,0,Math.PI*2); ctx.fill();
  }

  if(state==='asleep'){
    // Bruno lying across doorway (horizontal, blocking the door)
    // Body horizontal
    rr(x-40, y+10, 80, 22, 6, '#3a3060', null);
    // Head (to the left, rolled to side)
    ctx.beginPath(); ctx.arc(x-52, y+14, 16, 0, Math.PI*2);
    ctx.fillStyle='#c8956a'; ctx.fill();
    // Closed eyes - X style asleep
    ctx.strokeStyle='#a07050'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-58,y+10); ctx.lineTo(x-54,y+14); ctx.moveTo(x-54,y+10); ctx.lineTo(x-58,y+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-48,y+10); ctx.lineTo(x-44,y+14); ctx.moveTo(x-44,y+10); ctx.lineTo(x-48,y+14); ctx.stroke();
    // Snore ZZZ
    ctx.fillStyle='#aaa8cc'; ctx.font='bold 13px Fredoka One'; ctx.textAlign='center';
    ctx.fillText('z z z',x-52,y-4);
    // Legs dangling
    ctx.fillStyle='#221850';
    ctx.fillRect(x+36, y+14, 10, 28);
    ctx.fillRect(x+46, y+14, 10, 28);
    // Badge on chest
    ctx.fillStyle='rgba(255,255,255,0.18)';
    rr(x-20,y+16,16,8,2,'rgba(255,255,255,0.18)',null);
    ctx.fillStyle='white'; ctx.font='bold 6px Nunito'; ctx.textAlign='center';
    ctx.fillText('CFTR',x-12,y+23);
    // Earpiece
    rr(x-52,y+2,3,7,2,'#444',null);
    return;
  }

  var suitCol = state==='sleepy' ? '#44405a'
              : state==='tired'  ? '#4a3010'
              : state==='hyped'  ? '#7a3f00'
              : '#1e1050';

  // Legs
  ctx.fillStyle='#221850';
  ctx.fillRect(x-11,y+32+bob,10,22);
  ctx.fillRect(x+1, y+32+bob,10,22);

  // Body
  rr(x-15,y+4+bob,30,30,5,suitCol,null);

  // Badge
  rr(x-8,y+10+bob,16,8,2,'rgba(255,255,255,0.18)',null);
  ctx.fillStyle='white'; ctx.font='bold 6px Nunito'; ctx.textAlign='center';
  ctx.fillText('CFTR',x,y+17+bob);

  // Head
  ctx.beginPath(); ctx.arc(x,y-14+bob,17,0,Math.PI*2);
  ctx.fillStyle='#c8956a'; ctx.fill();

  if(state==='sleepy'){
    ctx.strokeStyle='#a07050'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-9,y-18+bob); ctx.lineTo(x-4,y-15+bob); ctx.lineTo(x-9,y-12+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+9,y-18+bob); ctx.lineTo(x+4,y-15+bob); ctx.lineTo(x+9,y-12+bob); ctx.stroke();
    ctx.fillStyle='#aaa8cc'; ctx.font='bold 11px Fredoka One'; ctx.textAlign='center';
    ctx.fillText('z z z',x,y-36+bob);
  } else {
    // Sunglasses
    rr(x-14,y-19+bob,11,7,3,'#111',null);
    rr(x+3,  y-19+bob,11,7,3,'#111',null);
    ctx.fillStyle='#666'; ctx.fillRect(x-2,y-16+bob,4,2);
  }
  // Earpiece
  rr(x-19,y-17+bob,4,8,2,'#444',null);

  if(state==='hyped'){
    ctx.save();
    ctx.shadowColor='#f58a30'; ctx.shadowBlur=20;
    ctx.strokeStyle='#f58a30'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,y-14+bob,21,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  if(state==='tired'){
    ctx.fillStyle='rgba(232,64,64,0.7)';
    ctx.font='bold 10px Nunito'; ctx.textAlign='center';
    ctx.fillText('...',x,y-36+bob);
  }
}

// =========================================================
// QUEUE / SCORE UI
// =========================================================
function updateQ(pct,col){
  var f=document.getElementById('qbar-fill');
  f.style.width=Math.min(100,pct*100).toFixed(1)+'%';
  f.style.background=col;
  var l=document.getElementById('qbar-lbl');
  l.textContent=pct>0.7?'Queue overflowing!':pct>0.35?'Queue building':'Queue clear';
}
function setScore(v){
  score=v;
  document.getElementById('hud-score').textContent=v;
}

// =========================================================
// PARTICLE BURST
// =========================================================
function burst(cx,cy,col,n){
  col=col||'#f5c842'; n=n||9;
  var pl=document.getElementById('particles');
  for(var i=0;i<n;i++){
    var el=document.createElement('div');
    var a=(i/n)*360, d=26+Math.random()*38;
    el.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;width:8px;height:8px;border-radius:50%;background:'+col+';box-shadow:0 0 6px '+col+';transform:translate(-50%,-50%);transition:all .6s ease-out;pointer-events:none;';
    pl.appendChild(el);
    (function(e,angle,dist){
      requestAnimationFrame(function(){
        e.style.left=(cx+Math.cos(angle*Math.PI/180)*dist)+'px';
        e.style.top =(cy+Math.sin(angle*Math.PI/180)*dist)+'px';
        e.style.opacity='0';
      });
      setTimeout(function(){e.remove();},700);
    })(el,a,d);
  }
}

// =========================================================
// INSIDE-ION PLACEMENT
// =========================================================
function addInsideIon(col){
  var g=sceneGeom();
  // Target: random spot inside club, avoiding top label area
  var cols=4, rows=6;
  var idx=insideIons.length%(cols*rows);
  var c=idx%cols, r=Math.floor(idx/cols);
  var tx=g.split+22+c*(g.inW-44)/(cols-1);
  var ty=40+r*(g.doorY-g.doorH-50)/(rows-1);
  insideIons.push({
    x:g.split+5, y:g.doorY-20,
    tx:tx, ty:ty,
    r:12, col:col||'#4a90d9', alpha:0
  });
}

// =========================================================
// LEVEL INIT / NAV
// =========================================================
function goLevel(idx){
  if(idx<0||idx>4) return;
  currentLevel=idx;
  levelDone=false;
  score=0; queuePct=0.12; boostEnergy=100; frameN=0;
  insideIons=[];
  if(animId){cancelAnimationFrame(animId);animId=null;}
  canvas.onclick=null;
  // Remove drag listeners if any
  canvas.onmousedown=null; canvas.onmousemove=null; canvas.onmouseup=null;

  var L=LEVELS[idx];
  document.getElementById('lvl-badge').textContent=L.badge;
  document.getElementById('lvl-badge').style.background=L.color+'33';
  document.getElementById('lvl-badge').style.color=L.color;
  document.getElementById('lvl-badge').style.border='1px solid '+L.color+'88';
  document.getElementById('lvl-title').textContent=L.title;
  document.getElementById('lvl-sub').textContent=L.sub;
  document.getElementById('lesson-box').textContent=L.lesson;
  document.getElementById('lesson-box').style.borderColor=L.color;
  document.getElementById('hud-score').textContent='0';

  var showE=(L.mechanic==='energy'||L.mechanic==='full');
  document.getElementById('energy-wrap').style.display=showE?'flex':'none';

  // Pips
  var pips=document.getElementById('pips');
  pips.innerHTML='';
  for(var i=0;i<5;i++){
    var p=document.createElement('div');
    p.className='lvl-pip'+(i<idx?' done':i===idx?' active':'');
    p.setAttribute('data-lvl',i);
    p.onclick=(function(li){return function(){goLevel(li);};})(i);
    pips.appendChild(p);
  }
  document.getElementById('btn-prev').disabled=false;
  document.getElementById('btn-next').disabled=false;

  resizeCanvas();
  buildActions(L.mechanic);
}

function buildActions(mechanic){
  var ar=document.getElementById('action-row');
  ar.innerHTML='';
  if(mechanic==='tap'){
    var b=mkBtn('Start!','btn-teal');
    b.onclick=function(){ar.innerHTML='';startTap();};
    ar.appendChild(b);
  } else if(mechanic==='watch'){
    var b2=mkBtn('Watch what happens...','btn-red');
    b2.onclick=function(){ar.innerHTML='';startWatch();};
    ar.appendChild(b2);
  } else if(mechanic==='coffee'){
    var b3=mkBtn('Give Bruno a wake-up call!','btn-gold');
    b3.onclick=function(){ar.innerHTML='';startCoffee();};
    ar.appendChild(b3);
  } else if(mechanic==='energy'){
    var b4=mkBtn('Give Bruno his energy drink!','btn-orange');
    b4.onclick=function(){ar.innerHTML='';startEnergy();};
    ar.appendChild(b4);
  } else if(mechanic==='full'){
    var b5=mkBtn('Launch full treatment!','btn-pink');
    b5.onclick=function(){ar.innerHTML='';startFull();};
    ar.appendChild(b5);
  }
}

function mkBtn(label,cls){
  var b=document.createElement('button');
  b.className='btn '+cls; b.textContent=label;
  return b;
}

// =========================================================
// LEVEL 1: Tap ions
// =========================================================
function startTap(){
  var ions=[]; var tapped=0; var TARGET=15; var spawnT=0;
  queuePct=0.35;

  function spawn(){
    var g=sceneGeom();
    ions.push({
      x: g.split-60-Math.random()*160,
      y: g.doorY-25+(Math.random()-0.5)*28,
      r: 16+Math.random()*5, alive:true
    });
  }
  for(var i=0;i<5;i++) spawn();

  canvas.onclick=function(e){
    var rect=canvas.getBoundingClientRect();
    var mx=(e.clientX-rect.left)*(CW()/rect.width);
    var my=(e.clientY-rect.top) *(CH()/rect.height);
    for(var i=0;i<ions.length;i++){
      var ion=ions[i];
      if(!ion.alive) continue;
      if(Math.hypot(ion.x-mx,ion.y-my)<ion.r+14){
        ion.alive=false; tapped++;
        setScore(tapped);
        burst(e.clientX,e.clientY,'#4a90d9');
        addInsideIon('#4a90d9');
        queuePct=Math.max(0.04,queuePct-0.04);
        if(tapped>=TARGET){winLevel(0); return;}
        break;
      }
    }
  };

  function loop(){
    frameN++; spawnT++;
    if(spawnT%52===0) spawn();
    var g=sceneGeom();
    ctx.clearRect(0,0,g.cw,g.ch);
    drawScene('ok');
    for(var i=0;i<ions.length;i++){
      var ion=ions[i];
      if(!ion.alive) continue;
      ion.x=Math.min(ion.x+0.45,g.split-24);
      drawIon(ion.x,ion.y,ion.r,'#4a90d9');
    }
    updateQ(queuePct,'#4cbb7a');
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// =========================================================
// LEVEL 2: Watch overflow
// =========================================================
function startWatch(){
  var ions=[]; var spawnT=0;
  queuePct=0.05;

  function spawn(){
    var g=sceneGeom();
    ions.push({
      x:g.split-55-Math.random()*30,
      y:g.doorY-25+(Math.random()-0.5)*30,
      r:15+Math.random()*4, alive:true,
      vx:-(0.1+Math.random()*0.07)
    });
  }
  for(var i=0;i<4;i++) spawn();

  function loop(){
    frameN++; spawnT++;
    if(spawnT%38===0) spawn();
    var g=sceneGeom();
    ctx.clearRect(0,0,g.cw,g.ch);
    drawScene('asleep');
    for(var i=0;i<ions.length;i++){
      var ion=ions[i];
      if(!ion.alive) continue;
      ion.x=Math.max(8,ion.x+ion.vx);
      drawIon(ion.x,ion.y,ion.r,'#e84040');
    }
    queuePct=Math.min(0.97,queuePct+0.003);
    updateQ(queuePct,'#e84040');
    if(queuePct>=0.95){cancelAnimationFrame(animId);setTimeout(function(){winLevel(1);},400);return;}
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// =========================================================
// LEVEL 3: Coffee drag
// =========================================================
function startCoffee(){
  var ions=[]; var coffX=70,coffY=0;
  var dragging=false,offX=0,offY=0;
  var delivered=false, wakePct=0;
  queuePct=0.80;

  var g0=sceneGeom();
  coffY=g0.doorY-20;
  for(var i=0;i<9;i++){
    ions.push({x:g0.split-55-i*40,y:g0.doorY-25+(Math.random()-0.5)*26,r:15,alive:true});
  }

  function ptr(e){
    var src=e.touches?e.touches[0]:e;
    var rect=canvas.getBoundingClientRect();
    return{x:(src.clientX-rect.left)*(CW()/rect.width),y:(src.clientY-rect.top)*(CH()/rect.height)};
  }
  function onDown(e){
    if(delivered) return;
    var p=ptr(e);
    if(Math.hypot(p.x-coffX,p.y-coffY)<40){dragging=true;offX=p.x-coffX;offY=p.y-coffY;e.preventDefault();}
  }
  function onMove(e){
    if(!dragging) return;
    var p=ptr(e); coffX=p.x-offX; coffY=p.y-offY; e.preventDefault();
  }
  function onUp(e){
    if(!dragging) return; dragging=false;
    var g=sceneGeom();
    if(Math.hypot(coffX-g.brunoX,coffY-g.brunoY)<80){
      delivered=true;
      burst(g.brunoX,g.brunoY-30,'#f5c842',14);
    } else {
      coffX=70; coffY=g.doorY-20;
    }
    e.preventDefault();
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp,  {passive:false});

  function cleanup(){
    canvas.removeEventListener('mousedown', onDown);
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('mouseup',   onUp);
    canvas.removeEventListener('touchstart',onDown);
    canvas.removeEventListener('touchmove', onMove);
    canvas.removeEventListener('touchend',  onUp);
  }

  function loop(){
    frameN++;
    var g=sceneGeom();
    ctx.clearRect(0,0,g.cw,g.ch);
    var bst = delivered&&wakePct>0.6?'ok':'sleepy';
    drawScene(bst);

    if(delivered){
      wakePct=Math.min(1,wakePct+0.013);
      queuePct=Math.max(0.06,queuePct-0.007);
      setScore(Math.floor(wakePct*100));
      for(var i=0;i<ions.length;i++){
        var ion=ions[i];
        if(!ion.alive) continue;
        ion.x=Math.min(ion.x+1.3,g.split+5);
        if(ion.x>=g.split+3){ion.alive=false;addInsideIon('#4a90d9');}
        else drawIon(ion.x,ion.y,ion.r,'#4a90d9');
      }
      // Wake arc
      ctx.beginPath();
      ctx.arc(g.brunoX,g.brunoY-38,24,-Math.PI/2,-Math.PI/2+wakePct*Math.PI*2);
      ctx.strokeStyle='#f5c842';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
    } else {
      for(var j=0;j<ions.length;j++){
        if(ions[j].alive) drawIon(ions[j].x,ions[j].y,ions[j].r,'#e84040',0.72);
      }
    }

    // Coffee cup
    if(!delivered){
      ctx.font='38px serif'; ctx.textAlign='center';
      ctx.fillText('\u2615',coffX,coffY);
      if(!dragging){
        ctx.font='bold 11px Nunito'; ctx.fillStyle='#f5c842'; ctx.textAlign='center';
        ctx.fillText('Drag to Bruno!',coffX,coffY-28);
      }
    }

    updateQ(queuePct,queuePct<0.45?'#4cbb7a':'#f5c842');
    if(queuePct<=0.08){cleanup();cancelAnimationFrame(animId);setTimeout(function(){winLevel(2);},500);return;}
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// =========================================================
// LEVEL 4: Energy drink (drag once)
// =========================================================
function startEnergy(){
  var ions=[]; var spawnT=0;
  var canX=80,canY=0;
  var dragging=false,offX=0,offY=0;
  var delivered=false,warmupPct=0,warmupDone=false;
  queuePct=0.72; boostEnergy=30;

  var g0=sceneGeom();
  canY=g0.doorY-30;
  for(var i=0;i<7;i++){
    ions.push({x:g0.split-55-i*40,y:g0.doorY-25+(Math.random()-0.5)*28,r:16,alive:true});
  }

  function ptr(e){
    var src=e.touches?e.touches[0]:e;
    var rect=canvas.getBoundingClientRect();
    return{x:(src.clientX-rect.left)*(CW()/rect.width),y:(src.clientY-rect.top)*(CH()/rect.height)};
  }
  function onDown(e){
    if(delivered) return;
    var p=ptr(e);
    if(Math.hypot(p.x-canX,p.y-canY)<42){dragging=true;offX=p.x-canX;offY=p.y-canY;e.preventDefault();}
  }
  function onMove(e){
    if(!dragging) return;
    var p=ptr(e);canX=p.x-offX;canY=p.y-offY;e.preventDefault();
  }
  function onUp(e){
    if(!dragging) return; dragging=false;
    var g=sceneGeom();
    if(Math.hypot(canX-g.brunoX,canY-g.brunoY)<80){
      delivered=true;
      burst(g.brunoX,g.brunoY-30,'#f58a30',14);
    } else {
      canX=80;canY=g.doorY-30;
    }
    e.preventDefault();
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp,  {passive:false});

  function cleanup(){
    canvas.removeEventListener('mousedown', onDown);
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('mouseup',   onUp);
    canvas.removeEventListener('touchstart',onDown);
    canvas.removeEventListener('touchmove', onMove);
    canvas.removeEventListener('touchend',  onUp);
  }

  var ionScore=0;
  function loop(){
    frameN++; spawnT++;
    if(spawnT%55===0&&!warmupDone){
      var g2=sceneGeom();
      ions.push({x:g2.split-60-Math.random()*50,y:g2.doorY-25+(Math.random()-0.5)*28,r:16,alive:true});
    }
    var g=sceneGeom();
    ctx.clearRect(0,0,g.cw,g.ch);

    var brunoSt='sleepy';
    if(delivered){
      warmupPct=Math.min(1,warmupPct+0.014);
      if(warmupPct<1){
        brunoSt='hyped';
        boostEnergy=Math.min(100,boostEnergy+1.4);
      } else {
        warmupDone=true;
        boostEnergy=Math.max(20,boostEnergy-0.06);
        brunoSt='hyped';
      }
    }

    drawScene(brunoSt);

    if(delivered&&warmupPct<1){
      var jj=Math.sin(frameN*0.45)*0.5+0.5;
      var bx=g.brunoX,by=g.brunoY;
      var armAng=jj*60-30;
      ctx.save();
      ctx.strokeStyle='#f58a30';ctx.lineWidth=4;ctx.lineCap='round';
      var rad=armAng*Math.PI/180;
      ctx.beginPath();
      ctx.moveTo(bx-8,by+12);
      ctx.lineTo(bx-8-Math.sin(rad)*28,by+12-Math.cos(rad)*20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx+8,by+12);
      ctx.lineTo(bx+8+Math.sin(rad)*28,by+12-Math.cos(rad)*20);
      ctx.stroke();
      ctx.font='bold 11px Nunito';ctx.fillStyle='#f58a30';ctx.textAlign='center';
      ctx.fillText('Warming up!',bx,by-52);
      ctx.restore();
      ctx.beginPath();
      ctx.arc(bx,by-38,24,-Math.PI/2,-Math.PI/2+warmupPct*Math.PI*2);
      ctx.strokeStyle='#f58a30';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
    }

    if(warmupDone){
      document.getElementById('energy-fill').style.width=boostEnergy+'%';
      for(var i=0;i<ions.length;i++){
        var ion=ions[i];
        if(!ion.alive) continue;
        ion.x=Math.min(ion.x+1.8,g.split+5);
        if(ion.x>=g.split+3){ion.alive=false;ionScore++;setScore(ionScore);addInsideIon('#4a90d9');}
        else drawIon(ion.x,ion.y,ion.r,'#4a90d9');
      }
      queuePct=Math.max(0.0,queuePct-0.008);
    } else {
      for(var j=0;j<ions.length;j++){
        if(ions[j].alive) drawIon(ions[j].x,ions[j].y,ions[j].r,'#e84040',0.65);
      }
    }

    if(!delivered){
      ctx.save();
      ctx.translate(canX,canY);
      rr(-11,-24,22,34,4,'#f58a30',null);
      rr(-11,-24,22,13,4,'#f5c842',null);
      ctx.fillStyle='white';ctx.font='bold 7px Nunito';ctx.textAlign='center';
      ctx.fillText('BOOST',0,-11);
      ctx.fillText('DRINK',0,-3);
      ctx.restore();
      if(!dragging){
        ctx.font='bold 11px Nunito';ctx.fillStyle='#f58a30';ctx.textAlign='center';
        ctx.fillText('Drag to Bruno!',canX,canY-34);
      }
    }

    updateQ(queuePct,warmupDone?'#4cbb7a':'#e84040');

    if(queuePct<=0.0&&warmupDone){
      cleanup();cancelAnimationFrame(animId);setTimeout(function(){winLevel(3);},400);return;
    }
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// =========================================================
// LEVEL 5: Full game
// =========================================================
function startFull(){
  var ions=[]; var spawnT=0;
  var items=[
    {id:'coffee',x:55, y:0,col:'#f5c842',delivered:false},
    {id:'can',   x:115,y:0,col:'#f58a30',delivered:false}
  ];
  var bothDelivered=false,warmPct=0,warmDone=false;
  var ionScore=0;
  queuePct=0.85; boostEnergy=0;

  var g0=sceneGeom();
  items[0].y=g0.doorY-25;
  items[1].y=g0.doorY-25;
  for(var i=0;i<10;i++){
    ions.push({x:g0.split-60-i*36,y:g0.doorY-25+(Math.random()-0.5)*30,r:16+Math.random()*4,alive:true});
  }

  function ptr(e){
    var src=e.touches?e.touches[0]:e;
    var rect=canvas.getBoundingClientRect();
    return{x:(src.clientX-rect.left)*(CW()/rect.width),y:(src.clientY-rect.top)*(CH()/rect.height)};
  }
  var activeItem=null;
  function onDown(e){
    if(bothDelivered) return;
    var p=ptr(e);
    for(var i=0;i<items.length;i++){
      var it=items[i];
      if(it.delivered) continue;
      if(Math.hypot(p.x-it.x,p.y-it.y)<46){activeItem=it;it.offX=p.x-it.x;it.offY=p.y-it.y;e.preventDefault();return;}
    }
  }
  function onMove(e){
    if(!activeItem) return;
    var p=ptr(e);activeItem.x=p.x-activeItem.offX;activeItem.y=p.y-activeItem.offY;e.preventDefault();
  }
  function onUp(e){
    if(!activeItem) return;
    var g=sceneGeom();
    if(Math.hypot(activeItem.x-g.brunoX,activeItem.y-g.brunoY)<85){
      activeItem.delivered=true;
      burst(g.brunoX,g.brunoY-30,activeItem.col,12);
      if(items[0].delivered&&items[1].delivered){bothDelivered=true;}
    } else {
      activeItem.x=(activeItem.id==='coffee')?55:115;
      var g2=sceneGeom();activeItem.y=g2.doorY-25;
    }
    activeItem=null;e.preventDefault();
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp,  {passive:false});
  function cleanup(){
    canvas.removeEventListener('mousedown', onDown);
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('mouseup',   onUp);
    canvas.removeEventListener('touchstart',onDown);
    canvas.removeEventListener('touchmove', onMove);
    canvas.removeEventListener('touchend',  onUp);
    canvas.onclick=null;
  }

  function loop(){
    frameN++; spawnT++;
    // Only spawn more ions before treatments arrive
    if(!bothDelivered&&spawnT%50===0){
      var gs=sceneGeom();
      ions.push({x:gs.split-60-Math.random()*50,y:gs.doorY-25+(Math.random()-0.5)*30,r:16+Math.random()*4,alive:true});
    }
    var g=sceneGeom();
    ctx.clearRect(0,0,g.cw,g.ch);

    // State machine
    var brunoSt='sleepy';
    if(bothDelivered){
      warmPct=Math.min(1,warmPct+0.014);
      boostEnergy=Math.min(100,boostEnergy+1.4);
      if(warmPct>=1){
        warmDone=true;
        boostEnergy=Math.max(20,boostEnergy-0.06);
        brunoSt='hyped';
      } else {
        brunoSt='hyped';
      }
    } else if(items[0].delivered||items[1].delivered){
      brunoSt='sleepy';
    }

    drawScene(brunoSt);

    // Warmup arc
    if(bothDelivered&&warmPct<1){
      var bx=g.brunoX,by=g.brunoY;
      var jj=Math.sin(frameN*0.45)*0.5+0.5;
      var aa=jj*60-30;
      ctx.save();
      ctx.strokeStyle='#e84393';ctx.lineWidth=4;ctx.lineCap='round';
      var rad=aa*Math.PI/180;
      ctx.beginPath();ctx.moveTo(bx-8,by+12);ctx.lineTo(bx-8-Math.sin(rad)*28,by+12-Math.cos(rad)*20);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+8,by+12);ctx.lineTo(bx+8+Math.sin(rad)*28,by+12-Math.cos(rad)*20);ctx.stroke();
      ctx.restore();
      ctx.beginPath();
      ctx.arc(bx,by-38,24,-Math.PI/2,-Math.PI/2+warmPct*Math.PI*2);
      ctx.strokeStyle='#e84393';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
      ctx.font='bold 11px Nunito';ctx.fillStyle='#e84393';ctx.textAlign='center';
      ctx.fillText('Full treatment active!',bx,by-64);
    }

    document.getElementById('energy-fill').style.width=Math.min(100,boostEnergy)+'%';

    // Move ions once warmup done
    if(warmDone){
      for(var i=0;i<ions.length;i++){
        var ion=ions[i];
        if(!ion.alive) continue;
        ion.x=Math.min(ion.x+1.8,g.split+5);
        if(ion.x>=g.split+3){ion.alive=false;ionScore++;setScore(ionScore);addInsideIon('#e84393');}
        else drawIon(ion.x,ion.y,ion.r,'#e84393');
      }
      queuePct=Math.max(0.0,queuePct-0.009);
    } else {
      for(var j=0;j<ions.length;j++){
        if(ions[j].alive) drawIon(ions[j].x,ions[j].y,ions[j].r,'#e84040',0.65);
      }
    }

    updateQ(queuePct,warmDone?'#4cbb7a':'#e84040');

    // Draw items not yet delivered
    for(var ii=0;ii<items.length;ii++){
      var it=items[ii];
      if(it.delivered) continue;
      if(it.id==='coffee'){
        ctx.font='36px serif';ctx.textAlign='center';
        ctx.fillText('\u2615',it.x,it.y);
      } else {
        ctx.save();ctx.translate(it.x,it.y);
        rr(-11,-24,22,34,4,'#f58a30',null);
        rr(-11,-24,22,13,4,'#f5c842',null);
        ctx.fillStyle='white';ctx.font='bold 7px Nunito';ctx.textAlign='center';
        ctx.fillText('BOOST',0,-11);ctx.fillText('DRINK',0,-3);
        ctx.restore();
      }
      if(it!==activeItem){
        ctx.font='bold 10px Nunito';ctx.fillStyle=it.col;ctx.textAlign='center';
        ctx.fillText('Drag to Bruno!',it.x,it.y-34);
      }
    }

    // Win: queue fully cleared
    if(queuePct<=0.0&&warmDone){
      cleanup();cancelAnimationFrame(animId);setTimeout(function(){winLevel(4);},400);return;
    }
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

function winLevel(idx){
  if(levelDone) return; levelDone=true;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  var d=WIN[idx];
  document.getElementById('t-icon').textContent=d.icon;
  document.getElementById('t-title').textContent=d.title;
  document.getElementById('t-body').textContent=d.body;
  var cert=document.getElementById('t-cert');
  if(d.cert){cert.textContent=d.cert;cert.style.display='block';}
  else{cert.style.display='none';}
  var tbtn=document.getElementById('t-btn');
  if(idx===4){
    tbtn.textContent='Play Again!';
    tbtn.onclick=function(){hideToast();goLevel(0);};
  } else {
    tbtn.textContent='Next Level';
    tbtn.onclick=function(){hideToast();goLevel(idx+1);};
  }
  document.getElementById('toast').classList.add('show');
}
function hideToast(){document.getElementById('toast').classList.remove('show');}

// Make toast draggable
(function(){
  var toast=document.getElementById('toast');
  var dragX=0,dragY=0,startX=0,startY=0,isDragging=false;
  toast.style.cursor='grab';
  toast.addEventListener('mousedown',function(e){
    if(e.target.tagName==='BUTTON') return;
    isDragging=true;
    var rect=toast.getBoundingClientRect();
    startX=e.clientX-(rect.left+rect.width/2);
    startY=e.clientY-(rect.top+rect.height/2);
    toast.style.cursor='grabbing';
    toast.style.transition='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!isDragging) return;
    dragX=e.clientX-startX;
    dragY=e.clientY-startY;
    toast.style.left=dragX+'px';
    toast.style.top=dragY+'px';
    toast.style.transform='scale(1)';
  });
  document.addEventListener('mouseup',function(){
    if(!isDragging) return;
    isDragging=false;
    toast.style.cursor='grab';
  });
  // Reset position when toast is hidden
  var origShow=toast.classList.add.bind(toast.classList);
  var observer=new MutationObserver(function(){
    if(!toast.classList.contains('show')){
      toast.style.left='50%';
      toast.style.top='50%';
      toast.style.transform='translate(-50%,-50%) scale(1)';
      toast.style.transition='';
      dragX=0;dragY=0;
    }
  });
  observer.observe(toast,{attributes:true,attributeFilter:['class']});
})();
